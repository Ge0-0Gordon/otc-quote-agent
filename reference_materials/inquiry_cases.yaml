source_section: "4）相关询价案例"
cases:
  - case_id: "reference_case_01"
    source_format: "embedded_image_manual_transcription"
    raw_text: |-
      1、欧式雪球询价表
      标的代码/标的名称：000852 中证1000；敲入障碍65%或60%
      标的代码/标的名称：000905 中证500；敲入障碍65%或60%
      标的代码/标的名称：000300 沪深300；敲入障碍70%
      标的代码/标的名称：000016 上证50；敲入障碍75%
      以上方案：敲出障碍100%，降敲0.5%，第3个月开始、每月观察敲出，
      期限24个月，保证金比例100%，最大亏损100%，名义本金2000W，
      锁价一周，到期只观察一次敲入，询票息。
    inferred_product_type: "snowball"
    supported_status: "partial"
    key_terms:
      underlying: "中证1000/中证500/沪深300/上证50"
      notional: "2000W"
      tenor: "24M"
      lockout_period: "3M"
      knock_in_barrier: "按方案为60%/65%/70%/75%"
      knock_out_barrier: "100%"
      margin_ratio: "100%"
      max_loss: "100%"
      coupon_terms: "票息待询价；降敲0.5%"
    notes: "由官方 DOCX image1 人工逐项核对转录；一个表格包含多个方案，适合按 quote_candidates 扩展。"

  - case_id: "reference_case_02"
    source_format: "embedded_image_manual_transcription"
    raw_text: |-
      2、holding：3周。大雪球结构—期末观察敲入。
      标的：中证1000；ticker：000852.SH；期限24个月；敲出观察频率每月；
      预付金比例0.982或0.985；返息分别为绝对1.92%或绝对1.6%；
      观察次数22；付息观察开始时间第3个月月末；
      Y1=1.01:0.01:0.8；Y2=0.7；票息C待询。
    inferred_product_type: "snowball"
    supported_status: "partial"
    key_terms:
      underlying: "中证1000"
      notional: null
      tenor: "24M"
      lockout_period: "3M"
      knock_in_barrier: "70%"
      knock_out_barrier: "Y1=1.01:0.01:0.8"
      margin_ratio: "预付金比例0.982或0.985"
      max_loss: null
      coupon_terms: "绝对返息1.92%或1.6%；票息C待询"
    notes: "由官方 DOCX image2 人工核对转录；包含两个预付金/返息方案。"

  - case_id: "reference_case_03"
    source_format: "embedded_image_manual_transcription"
    raw_text: |-
      3、Holding：3周。大雪球结构（Snowball）。
      中证500（000905.SH）或中证1000（000852.SH），期限24个月，
      付息/敲出观察频率每月，预付金比例100%，返息年化0.95%，
      观察次数22，第3个月月末开始观察。
      Y1方案包括0.96:0.005:0.855或1:0.008:0.832；
      中证500的Y2为0.7，中证1000的Y2为0.7或0.65；
      部分方案询首年票息，次年/红利票息5.2%，其余票息C待询。
    inferred_product_type: "snowball"
    supported_status: "partial"
    key_terms:
      underlying: "中证500/中证1000"
      notional: null
      tenor: "24M"
      lockout_period: "3M"
      knock_in_barrier: "按方案为65%或70%"
      knock_out_barrier: "Y1递减方案"
      margin_ratio: "预付金比例100%"
      max_loss: null
      coupon_terms: "年化返息0.95%；次年/红利5.2%；首年或C待询"
    notes: "由官方 DOCX image3 人工核对转录；六个组合方案不应合并成一个报价。"

