    raw_text: |-
      5、经典雪球。
      中证500（000905.SH）：期限36M，103%降敲1%，第三个月开始月度观察，
      敲入观察及派息障碍价格为53%、54%或55%，年化返息0.5%。
      沪深300（000300.SH）：期限36M，100%降敲0.5%，第三个月开始月度观察，
      敲入观察及派息障碍价格70%，年化返息0.5%。
      备注：锁价一周，不超过2000W；超过派息障碍价格付息，敲出或交易结束结算；询月度票息。
    inferred_product_type: "snowball"
    supported_status: "partial"
    key_terms:
      underlying: "中证500/沪深300"
      notional: "不超过2000W"
      tenor: "36M"
      lockout_period: "3M"
      knock_in_barrier: "中证500为53%/54%/55%；沪深300为70%"
      knock_out_barrier: "中证500为103%降敲1%；沪深300为100%降敲0.5%"
      margin_ratio: null
      max_loss: null
      coupon_terms: "年化返息0.5%；月度票息待询"
    notes: "由官方 DOCX image5 人工核对转录；多个指数和障碍线应拆成候选方案。"

  - case_id: "reference_case_06"
    source_format: "embedded_image_manual_transcription"
    raw_text: |-
      6、holding：3周。
      凤凰结构—每日观察敲入：中证1000（000852.SH），期限24或36个月，
      付息/敲出观察频率每月，预付金比例0.982，返息绝对1.93%，
      第1个月月末开始付息观察，第3个月月末开始敲出观察；
      24M方案Y1=1.01:0.005:0.905、Y2=0.7、Y3=0.75；
      36M方案Y1=1.01:0.005:0.845、Y2=0.6、Y3=0.7；票息C待询。
      凤凰结构—期末观察敲入（DCN）：中证1000（000852.SH），期限24或36个月，
      付息/敲出观察频率每月，预付金比例0.982，返息绝对1.93%，
      第1个月月末开始付息观察，第3个月月末开始敲出观察；
      24M方案Y2=0.75、Y3=0.75；36M方案Y2=0.68、Y3=0.78；票息C待询。
    inferred_product_type: "unsupported"
    supported_status: "unsupported"
    key_terms:
      underlying: "中证1000"
      notional: null
      tenor: "24M或36M"
      lockout_period: "敲出观察从3M开始"
      knock_in_barrier: "按方案为60%/68%/70%/75%"
      knock_out_barrier: "递减敲出线"
      margin_ratio: "预付金比例0.982"
      max_loss: null
      coupon_terms: "绝对返息1.93%；票息C待询"
    notes: "由官方 DOCX image6 人工核对转录；包含凤凰和DCN，当前必须识别为 unsupported，不套雪球 schema。"

