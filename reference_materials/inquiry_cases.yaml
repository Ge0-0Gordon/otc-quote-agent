      敲入观察为53%、55%或57%；年化返息2.0%；票息待询；
      备注：锁价一周，不超过2000W。
    inferred_product_type: "snowball"
    supported_status: "partial"
    key_terms:
      underlying: "中证1000"
      notional: "不超过2000W"
      tenor: "24M或36M"
      lockout_period: "3M"
