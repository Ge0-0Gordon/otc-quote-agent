source_document: "金融创新业务部衍生品参考资料.docx"
source_section: "3）标准化衍生品结构要素"
terms:
  - original_field: "收益结构（结构名称）"
    suggested_schema_field: "structure_name / product_type"
    suggested_type: "string / enum"
    requirement_level: "required"
    notes: "结构名称保留原文；product_type 归一化为系统支持的产品枚举。"

  - original_field: "挂钩标的"
    suggested_schema_field: "underlyings"
    suggested_type: "list[Underlying]"
    requirement_level: "required"
    notes: "使用标的主数据映射规范名称、ticker、资产类别、交易所和币种。"

  - original_field: "名义本金"
    suggested_schema_field: "notional"
    suggested_type: "number"
    requirement_level: "required"
    notes: "统一为基础货币单位数值；材料中的单位可能为万、w/W。"

  - original_field: "交易时间（起始日期）"
    suggested_schema_field: "trade_date / start_date"
    suggested_type: "date"
    requirement_level: "optional"
    notes: "明确交易日时写入 trade_date；明确结构起始日时写入 start_date。"

  - original_field: "期初价格"
    suggested_schema_field: "initial_price"
    suggested_type: "number"
    requirement_level: "optional"
    notes: "报价询价阶段可能尚未确定，允许为空。"

  - original_field: "保证金/保证金比例（%）"
    suggested_schema_field: "margin_ratio"
    suggested_type: "percentage"
    requirement_level: "warning-only"
    notes: "JSON 内部使用小数；限亏雪球缺失时提示 warning。"

  - original_field: "最大亏损（%）"
    suggested_schema_field: "max_loss"
    suggested_type: "percentage"
    requirement_level: "warning-only"
    notes: "JSON 内部使用小数；限亏雪球缺失时提示 warning。"

  - original_field: "敲出价格（%）"
    suggested_schema_field: "knock_out_barrier"
    suggested_type: "percentage"
    requirement_level: "optional"
    notes: "雪球类产品为关键字段；其他结构可为空。"

  - original_field: "敲入价格（%）"
    suggested_schema_field: "knock_in_barrier"
    suggested_type: "percentage"
    requirement_level: "optional"
    notes: "雪球类产品为关键字段；其他结构可为空。"

  - original_field: "期限（单位月）"
    suggested_schema_field: "tenor"
    suggested_type: "tenor"
    requirement_level: "required"
    notes: "归一化为 36M、2Y 等格式。"

  - original_field: "锁定期（单位月）"
    suggested_schema_field: "lockout_period"
    suggested_type: "tenor"
    requirement_level: "warning-only"
    notes: "雪球类产品缺失时提示 warning。"

  - original_field: "票息结构"
    suggested_schema_field: "coupon_structure / coupon_rate"
    suggested_type: "string / percentage"
    requirement_level: "optional"
    notes: "简单单一票息写入 coupon_rate；年化返息、绝对返息分别写入 annualized_rebate、absolute_rebate；复杂分年度或红利条款完整保留到 coupon_structure。"

  - original_field: "前端/后端年化收益率"
    suggested_schema_field: "front_back_annualized_return"
    suggested_type: "string"
    requirement_level: "optional"
    notes: "可能同时包含多个收益率，第一版保留结构化原文，避免错误拆分。"

  - original_field: "前端收益率"
    suggested_schema_field: "front_return"
    suggested_type: "percentage"
    requirement_level: "optional"
    notes: "JSON 内部使用小数。"

  - original_field: "备注"
    suggested_schema_field: "remarks"
    suggested_type: "string"
    requirement_level: "optional"
    notes: "保存规模限制、预计交易日、二选一方案等无法稳定拆分的信息。"
